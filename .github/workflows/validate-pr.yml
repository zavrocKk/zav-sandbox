name: Validate Pull Request

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v3
      
      - name: Verify CHANGELOG.md exists
        run: |
          echo "🔍 Checking if CHANGELOG.md exists..."
          if [ ! -f CHANGELOG.md ]; then
            echo "❌ ERROR: CHANGELOG.md not found!"
            echo "CHANGELOG.md is REQUIRED for all commits (Git Workflow Step 3.5)"
            exit 1
          fi
          echo "✅ CHANGELOG.md found!"
      
      - name: Validate CHANGELOG Format
        run: |
          echo "🔍 Validating CHANGELOG format..."
          if ! grep -q "## \[Unreleased\]" CHANGELOG.md; then
            echo "❌ ERROR: CHANGELOG.md missing [Unreleased] section!"
            exit 1
          fi
          echo "✅ CHANGELOG format is valid!"
      
      - name: Check PR body is not empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "🔍 Checking PR description body..."
          if [[ -z "$PR_BODY" || "$PR_BODY" == "null" ]]; then
            echo "❌ ERROR: PR body is empty!"
            echo "Every PR MUST have a filled description (copilot-instructions.md — PR DESCRIPTION convention)."
            echo "Open the compare URL and fill the description field before submitting the PR."
            exit 1
          fi
          echo "✅ PR body is present (${#PR_BODY} characters)."

      - name: Scan for deprecated paths
        run: |
          echo "🔍 Scanning for deprecated _gsane/bmm/ references..."
          HITS=$(grep -rl "_gsane/bmm/" .github/prompts/ _gsane/ 2>/dev/null | wc -l)
          if [[ "$HITS" -gt 0 ]]; then
            echo "❌ ERROR: $HITS file(s) still reference deprecated path _gsane/bmm/:"
            grep -rl "_gsane/bmm/" .github/prompts/ _gsane/ 2>/dev/null
            exit 1
          fi
          echo "✅ No deprecated paths found."

      - name: Validate agent manifest sync
        run: |
          echo "🔍 Checking .agent.md files present..."
          AGENT_MD_COUNT=$(find .github/agents -name "*.agent.md" 2>/dev/null | wc -l)
          echo "  .agent.md files found: $AGENT_MD_COUNT (expected: 13)"
          if [[ "$AGENT_MD_COUNT" -lt 13 ]]; then
            echo "⚠️  WARNING: Expected 13 .agent.md files, found $AGENT_MD_COUNT — run audit"
          fi
          echo "✅ Agent manifest check complete."

      - name: Validate GSANE Structure
        run: |
          echo "🔍 Checking GSANE directory structure..."
          required_dirs=(
            "_gsane" "_gsane/core" "_gsane/core/agents" "_gsane/core/workflows"
            "_gsane/_config" "_gsane/_memory" ".github/agents" ".github/prompts" ".github/skills"
          )
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ ERROR: Required directory '$dir' missing!"
              exit 1
            fi
          done
          echo "✅ GSANE structure is valid!"

      - name: Validate branch naming
        run: |
          echo "🔍 Checking branch naming convention..."
          branch_name="${{ github.head_ref }}"
          if [[ ! "$branch_name" =~ ^(feature|fix)\/[a-z0-9\-]+\-[0-9]{4}\-[0-9]{2}\-[0-9]{2}$ ]]; then
            echo "⚠️  WARNING: Branch name '$branch_name' doesn't follow convention"
            echo "Expected format: feature/{description}-YYYY-MM-DD or fix/{description}-YYYY-MM-DD"
          fi
          echo "✅ Branch naming check complete!"

      - name: Validation Summary
        run: |
          echo ""
          echo "✅ ================ VALIDATION PASSED ================"
          echo "✅ CHANGELOG.md exists and is properly formatted"
          echo "✅ PR body is not empty"
          echo "✅ No deprecated paths (_gsane/bmm/) detected"
          echo "✅ Agent .agent.md count verified"
          echo "✅ GSANE directory structure complete"
          echo "✅ All checks passed - Ready for merge!"
          echo "✅ ===================================================="

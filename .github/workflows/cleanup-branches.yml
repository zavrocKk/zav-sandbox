name: Cleanup Merged Branches

on:
  pull_request:
    types: [ closed ]

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    
    steps:
      - name: Delete feature/fix branch
        run: |
          echo "🗑️  Cleaning up merged branch: ${{ github.event.pull_request.head.ref }}"

      - name: Delete branch via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`✅ Branch '${branch}' deleted successfully`);
            } catch (error) {
              console.log(`⚠️ Could not delete branch '${branch}': ${error.message}`);
            }

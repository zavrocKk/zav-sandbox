user_name: Mon Seigneur
communication_language: Français
document_output_language: Français
output_folder: "{project-root}/_bmad-output"
## Agent Delegation & Governance System
# Controls enforcement of proper agent routing and delegation
delegation:
  enabled: true
  enforcement_mode: strict                                    # strict | permissive
  delegation_required: true                                  # All requests must route through delegation system
  agents_can_self_execute: false                             # Agents cannot bypass delegation routing
  delegation_matrix_path: "{project-root}/_bmad/_config/agent-delegation-matrix.csv"
  delegation_workflow_path: "{project-root}/_bmad/core/workflows/delegation/workflow.md"
  audit_log_path: "{output_folder}/delegation-audit.md"
  
## Violation Tracking
violations:
  enabled: true
  log_path: "{output_folder}/violations.log"
  auto_escalate_on_violation: true                          # Escalate to bmad-master on rule violation
  max_violations_before_lockdown: 0                         # 0 = unlimited (set higher for lockdown)

## System Enforcement
system:
  require_valid_workflow: true                              # All executed workflows must be validated
  require_activation_sequence: true                         # Agents must follow full activation sequence
  trace_all_delegations: true                               # Log every delegation decision
ide: github-copilot
configured_date: 2026-03-01T18:45:35.594Z
last_updated: 2026-03-01T18:45:35.594Z
configuration:
  instructions_file: ".github/copilot-instructions.md"
  agents_file: "AGENTS.md"

  # Copilot Chat — Agent activators
  # These activate specific BMAD agents via the agents dropdown or slash commands
  agents:
    - name: bmad-master
      description: "BMad Master — orchestrator principal BMAD. Point d'entrée pour toutes les opérations."
      activation_file: "_bmad/core/agents/bmad-master.md"
    - name: bmad-agent-builder
      description: "Bond — Expert en création et validation d'agents BMAD."
      activation_file: "_bmad/bmb/agents/agent-builder.md"
    - name: bmad-module-builder
      description: "Morgan — Expert en création et validation de modules BMAD."
      activation_file: "_bmad/bmb/agents/module-builder.md"
    - name: bmad-workflow-builder
      description: "Wendy — Expert en création et validation de workflows BMAD."
      activation_file: "_bmad/bmb/agents/workflow-builder.md"

  # Context files always injected into Copilot context window
  context_files:
    - path: "_bmad/core/config.yaml"
      reason: "Global config — user_name, communication_language, output_folder"
    - path: "_bmad/_config/agent-manifest.csv"
      reason: "Agent index for JIT selection and routing"
    - path: "AGENTS.md"
      reason: "Universal repo navigation guide"

  # Token optimization hints for Copilot
  token_optimization:
    load_strategy: "jit"                 # Load files only when needed
    avoid_reloading_config: true         # Config resolved once per session
    party_mode_profile_loading: "per-turn-csv-only"  # Use CSV rows, not full .md files

  # Encoding of project conventions for Copilot inline suggestions
  conventions:
    language: "Français"
    branch_prefix: ["feature/", "fix/"]
    never_commit_to: "main"
    output_folder: "_bmad-output/"
    workflow_engine: "_bmad/core/tasks/workflow.xml"
